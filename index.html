<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BlockSurvivor PvP</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#87CEEB; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; overflow:hidden; }
  canvas { display:block; border:2px solid #000; }
  #ui1 { position:absolute; top:20px; left:20px; color:#fff; font-size:20px; font-weight:bold; }
  #ui2 { position:absolute; bottom:20px; left:20px; color:#fff; font-size:20px; font-weight:bold; }
  #effects { position:absolute; bottom:20px; right:20px; color:#fff; font-size:20px; font-weight:bold; text-align:right; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="400"></canvas>
<div id="ui1">1P HP: 100</div>
<div id="ui2">2P HP: 100</div>
<div id="effects"></div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let keys = {};
document.addEventListener('keydown', e => keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()]=false);

const player1 = {x:100, y:300, width:30, height:50, color:'#FF5555', dy:0, gravity:0.8, jump:-12, onGround:true, HP:100, lastHit:0, lastHeal:0};
const player2 = {x:600, y:300, width:30, height:50, color:'#5555FF', dy:0, gravity:0.8, jump:-12, onGround:true, HP:100, lastHit:0, lastHeal:0};
const bullets = [];
let effectsText="";

function drawBackground(){
  ctx.fillStyle='#87CEEB'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#654321'; ctx.fillRect(0,canvas.height-50,canvas.width,50);
  ctx.fillStyle='#333';
  ctx.fillRect(100,canvas.height-150,50,100);
  ctx.fillRect(200,canvas.height-180,70,130);
  ctx.fillRect(320,canvas.height-160,60,110);
  ctx.fillRect(450,canvas.height-200,80,150);
  ctx.fillRect(580,canvas.height-170,50,120);
}

function drawPlayer(p){ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x+15,p.y+10,10,0,Math.PI*2); ctx.fill(); ctx.fillRect(p.x+5,p.y+20,20,30); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(p.x+10,p.y+10,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(p.x+20,p.y+10,3,0,Math.PI*2); ctx.fill();}

function shoot(p,dir){bullets.push({x:p.x+10, y:p.y+20, dx:dir*6, owner:p});}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBackground();

  // --- プレイヤー1 ---
  if(keys['a'] && player1.x>0) player1.x-=4;
  if(keys['d'] && player1.x+player1.width<canvas.width) player1.x+=4;
  if(keys['w'] && player1.onGround){player1.dy=player1.jump; player1.onGround=false;}
  if(keys['s']){} // しゃがみ（弾の判定回避用）
  if(keys['e']){if(!player1.lastShot || Date.now()-player1.lastShot>300){shoot(player1,1); player1.lastShot=Date.now();}}

  player1.dy+=player1.gravity; player1.y+=player1.dy;
  if(player1.y+player1.height>=canvas.height-50){player1.y=canvas.height-50-player1.height; player1.dy=0; player1.onGround=true;}
  drawPlayer(player1);

  // --- プレイヤー2 ---
  if(keys['arrowleft'] && player2.x>0) player2.x-=4;
  if(keys['arrowright'] && player2.x+player2.width<canvas.width) player2.x+=4;
  if(keys['arrowup'] && player2.onGround){player2.dy=player2.jump; player2.onGround=false;}
  if(keys['arrowdown']){}
  if(keys['l']){if(!player2.lastShot || Date.now()-player2.lastShot>300){shoot(player2,-1); player2.lastShot=Date.now();}}

  player2.dy+=player2.gravity; player2.y+=player2.dy;
  if(player2.y+player2.height>=canvas.height-50){player2.y=canvas.height-50-player2.height; player2.dy=0; player2.onGround=true;}
  drawPlayer(player2);

  // --- 弾処理 ---
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i]; b.x+=b.dx;
    ctx.fillStyle=b.owner===player1?'#FFAAAA':'#AAAAFF';
    ctx.fillRect(b.x,b.y,10,10);

    // 当たり判定
    const targets = [player1===b.owner?player2:player1];
    targets.forEach(p=>{
      if(p.HP>0 && b.x<p.x+p.width && b.x+10>p.x && b.y<p.y+p.height && b.y+10>p.y){
        p.HP-=20;
        p.lastHit=Date.now();
        bullets.splice(i,1);
      }
    });

    if(b.x<0 || b.x>canvas.width) bullets.splice(i,1);
  }

  // --- HP回復 ---
  [player1,player2].forEach(p=>{
    if(Date.now()-p.lastHit>3000 && (!p.lastHeal || Date.now()-p.lastHeal>3000)){
      p.HP=Math.min(p.HP+5,100);
      p.lastHeal=Date.now();
    }
  });

  // --- UI ---
  document.getElementById('ui1').innerText='1P HP: '+player1.HP;
  document.getElementById('ui2').innerText='2P HP: '+player2.HP;
  document.getElementById('effects').innerText=effectsText;

  // --- 勝敗判定 ---
  if(player1.HP<=0 || player2.HP<=0){
    alert((player1.HP<=0?'2P':'1P')+'の勝利！');
    location.reload();
  }

  requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
