<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BlockSurvivor 2.0</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#87CEEB; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; overflow:hidden; }
  canvas { background:#87CEEB; display:block; border:2px solid #000; }
  #score { position:absolute; top:20px; left:20px; color:#fff; font-size:24px; font-weight:bold; }
  #title { position:absolute; top:20px; right:20px; color:#fff; font-size:24px; font-weight:bold; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="400"></canvas>
<div id="score">Score: 0</div>
<div id="title">BlockSurvivor 2.0</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let keys = {};
let score = 0;
let gameOver = false;
let spawnTimer = 0;
let itemTimer = 0;
let difficultyThreshold = 20;
let enemySpeed = 2;
let enemySpawnRate = 180; 
let items = [];
let enemies = [];
let bullets = [];

const player = {
  x:100, y:300, width:30, height:50, color:'#FF5555',
  dy:0, gravity:0.8, jumpPower:-12, onGround:true,
  speed:4, invincible:false
};

document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function drawPlayer(x,y){
  // 丸っぽい頭
  ctx.fillStyle = player.color;
  ctx.beginPath();
  ctx.arc(x+15,y+10,10,0,Math.PI*2);
  ctx.fill();
  // 体（角丸）
  ctx.fillStyle = player.color;
  ctx.fillRect(x+5, y+20, 20, 30);
  // 目
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x+10,y+10,3,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x+20,y+10,3,0,Math.PI*2);
  ctx.fill();
}

function drawEnemy(e){
  // 丸頭
  ctx.fillStyle = e.color;
  ctx.beginPath();
  ctx.arc(e.x+15,e.y+10,10,0,Math.PI*2);
  ctx.fill();
  // 体
  ctx.fillStyle = e.color;
  ctx.fillRect(e.x+5,e.y+20,20,30);
  // 目
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(e.x+10,e.y+10,3,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(e.x+20,e.y+10,3,0,Math.PI*2);
  ctx.fill();
}

function update(){
  if(gameOver) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#654321';
  ctx.fillRect(0,canvas.height-50,canvas.width,50);

  // プレイヤー移動
  if((keys['a'] || keys['arrowleft']) && player.x>0) player.x -= player.speed;
  if((keys['d'] || keys['arrowright']) && player.x + player.width < canvas.width) player.x += player.speed;
  if((keys['w'] || keys['arrowup']) && player.onGround){
    player.dy = player.jumpPower;
    player.onGround = false;
  }

  player.dy += player.gravity;
  player.y += player.dy;
  if(player.y + player.height >= canvas.height-50){
    player.y = canvas.height-50-player.height;
    player.dy=0;
    player.onGround=true;
  }

  drawPlayer(player.x, player.y);

  // 敵生成
  spawnTimer++;
  if(spawnTimer > enemySpawnRate){
    spawnTimer=0;
    const yPos = canvas.height-50-50;
    enemies.push({x:canvas.width, y:yPos, color:'#5555FF', shootTimer:0, dy:Math.random()*2-1});
  }

  // アイテム生成（キャラが取りやすい範囲）
  itemTimer++;
  if(itemTimer>400){
    itemTimer=0;
    const xPos = Math.random()*(canvas.width-30)+50;
    const yPos = canvas.height-50-50- Math.random()*50;
    const fruitTypes = [
      {color:'red', score:5}, // リンゴ
      {color:'yellow', score:3}, // バナナ
      {color:'purple', score:7} // ブドウ
    ];
    const fruit = fruitTypes[Math.floor(Math.random()*fruitTypes.length)];
    items.push({x:xPos, y:yPos, width:20, height:20, color:fruit.color, score:fruit.score});
  }

  // 難易度調整
  if(Math.floor(score) >= difficultyThreshold){
    difficultyThreshold += 20;
    enemySpeed += 0.5;
    if(enemySpawnRate > 40) enemySpawnRate -=10;
  }

  // 敵処理
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    e.x -= enemySpeed;
    e.y += e.dy; // ランダム上下動
    if(e.y<50) e.dy=Math.abs(e.dy);
    if(e.y>canvas.height-50-50) e.dy=-Math.abs(e.dy);

    e.shootTimer++;
    if(e.shootTimer > 90){
      e.shootTimer=0;
      bullets.push({x:e.x, y:e.y+20, width:10, height:10, color:'#FF0', dx:-6});
    }

    drawEnemy(e);

    if(e.x+30<0) enemies.splice(i,1);

    if(!player.invincible && player.x < e.x+30 && player.x +30 > e.x &&
       player.y < e.y+50 && player.y+50 > e.y){
      gameOver = true;
      alert("Game Over! Score: "+Math.floor(score));
      location.reload();
    }
  }

  // 弾処理
  for(let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    b.x += b.dx;
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x,b.y,b.width,b.height);

    if(!player.invincible && player.x < b.x+b.width && player.x+30 > b.x &&
       player.y < b.y+b.height && player.y+50 > b.y){
      gameOver = true;
      alert("Game Over! Score: "+Math.floor(score));
      location.reload();
    }

    if(b.x+b.width<0) bullets.splice(i,1);
  }

  // アイテム処理
  for(let i=items.length-1;i>=0;i--){
    const it = items[i];
    ctx.fillStyle = it.color;
    ctx.beginPath();
    ctx.arc(it.x+10,it.y+10,10,0,Math.PI*2);
    ctx.fill();

    if(player.x < it.x+it.width && player.x+30 > it.x &&
       player.y < it.y+it.height && player.y+50 > it.y){
      score += it.score;
      items.splice(i,1);
    }
  }

  // スコア
  score +=0.02;
  document.getElementById('score').innerText = 'Score: '+Math.floor(score);

  requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
