<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>野球育成ガチャゲーム（10連対応）</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0b3d91;
  color: white;
}

h1 { margin-top: 20px; }

.container {
  margin: 20px auto;
  width: 400px;
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
}

button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: gold;
  cursor: pointer;
}

#player {
  margin-top: 15px;
  font-size: 18px;
}

.log {
  margin-top: 15px;
  height: 180px;
  overflow-y: auto;
  background: rgba(0,0,0,0.3);
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
}
</style>
</head>
<body>

<h1>⚾ 野球育成ガチャ（10連対応） ⚾</h1>

<div class="container">
  <button onclick="drawGacha()">単発ガチャ</button>
  <button onclick="drawTenGacha()">10連ガチャ</button>
  <button onclick="train()">トレーニング</button>
  <button onclick="match()">試合</button>

  <div id="player">選手がいません</div>

  <div class="log" id="log"></div>
</div>

<script>
let player = null;

const players = [
  {name:"新人投手", speed:110, control:40, rate:50},
  {name:"有望投手", speed:120, control:50, rate:30},
  {name:"エース候補", speed:130, control:60, rate:15},
  {name:"怪物投手", speed:140, control:70, rate:5}
];

function log(text){
  const logDiv = document.getElementById("log");
  logDiv.innerHTML = text + "<br>" + logDiv.innerHTML;
}

function drawGacha(){
  let rand = Math.random()*100;
  let sum = 0;
  for(let p of players){
    sum += p.rate;
    if(rand <= sum){
      player = {...p};
      updatePlayer();
      log("🎉 " + p.name + "を獲得！");
      break;
    }
  }
}

function drawTenGacha(){
  log("🔹 10連ガチャ開始 🔹");
  for(let i=0;i<10;i++){
    let rand = Math.random()*100;
    let sum = 0;
    for(let p of players){
      sum += p.rate;
      if(rand <= sum){
        player = {...p};
        updatePlayer();
        log(`(${i+1}) ${p.name} を獲得！`);
        break;
      }
    }
  }
}

function updatePlayer(){
  if(!player) return;
  document.getElementById("player").innerHTML =
    `名前: ${player.name}<br>球速: ${player.speed} km/h<br>コントロール: ${player.control}`;
}

function train(){
  if(!player){ log("選手がいない！"); return; }
  let upSpeed = Math.floor(Math.random()*3);
  let upControl = Math.floor(Math.random()*3);
  player.speed += upSpeed;
  player.control += upControl;
  updatePlayer();
  log("💪 トレーニング成功！（球速+"+upSpeed+", 制球+"+upControl+")");
}

function match(){
  if(!player){ log("選手がいない！"); return; }
  let power = player.speed + player.control;
  let enemy = Math.random()*200;
  if(power > enemy){
    log("🏆 試合勝利！さらに成長！");
    player.speed += 2;
    player.control += 2;
  } else {
    log("😢 試合敗北...");
  }
  updatePlayer();
}
</script>

</body>
</html>
