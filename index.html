<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>障害物競走</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: #87CEEB;
  font-family: Arial, sans-serif;
  text-align: center;
}
#gameArea {
  width: 400px;
  height: 600px;
  margin: 20px auto;
  background: #F5F5DC;
  position: relative;
  border: 2px solid #333;
  overflow: hidden;
}
.player {
  width: 40px;
  height: 40px;
  background: red;
  position: absolute;
  bottom: 10px;
  left: 180px;
  border-radius: 5px;
}
.obstacle {
  width: 40px;
  height: 40px;
  background: brown;
  position: absolute;
  top: 0;
  border-radius: 5px;
}
#score {
  font-size: 20px;
  margin-top: 10px;
}
</style>
</head>
<body>
<h1>校舎避けゲーム</h1>
<div id="score">スコア: 0</div>
<div id="gameArea">
  <div id="player" class="player"></div>
</div>
<script>
const gameArea = document.getElementById('gameArea');
const player = document.getElementById('player');
let playerPos = 180;
let score = 0;
let obstacles = [];
let gameOver = false;

// 障害物生成
function createObstacle(){
  const obs = document.createElement('div');
  obs.className = 'obstacle';
  obs.style.left = Math.floor(Math.random()*360) + 'px';
  obs.style.top = '0px';
  gameArea.appendChild(obs);
  obstacles.push(obs);
}

// 障害物移動
function moveObstacles(){
  for(let i=0;i<obstacles.length;i++){
    let obs = obstacles[i];
    let top = parseInt(obs.style.top);
    top += 4;
    obs.style.top = top + 'px';

    // 衝突判定
    let playerTop = parseInt(player.style.bottom);
    let playerLeft = playerPos;
    let obsLeft = parseInt(obs.style.left);
    let obsBottom = 600 - top - 40; // ゲームエリアの高さから計算

    if(obsBottom < playerTop + 40 && obsBottom + 40 > playerTop && obsLeft < playerLeft + 40 && obsLeft + 40 > playerLeft){
      gameOver = true;
    }

    // 画面外ならスコア加算
    if(top > 600){
      obs.remove();
      obstacles.splice(i,1);
      i--;
      if(!gameOver) score++;
    }
  }
  document.getElementById('score').innerText = 'スコア: '+score;
}

// キー操作
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft'){
    playerPos = Math.max(0, playerPos-20);
    player.style.left = playerPos+'px';
  } else if(e.key === 'ArrowRight'){
    playerPos = Math.min(360, playerPos+20);
    player.style.left = playerPos+'px';
  }
});

// ゲームループ
function gameLoop(){
  if(!gameOver){
    moveObstacles();
    if(Math.random() < 0.02) createObstacle();
    requestAnimationFrame(gameLoop);
  } else {
    alert('ゲームオーバー! スコア: '+score);
    location.reload();
  }
}

gameLoop();
